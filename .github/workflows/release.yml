name: Release

# Publishing is tag-driven, not merge-driven: pushing a v* tag is the
# explicit "this is a release" act. Cargo.toml and CHANGELOG.md must already
# describe that version in the tagged commit.
on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    # Uses crates.io Trusted Publishing (OIDC): configure this repository
    # and workflow under the crate's Settings -> Trusted Publishing on
    # crates.io. No long-lived token is stored anywhere.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - name: Verify release metadata
        run: |
          crate_version="$(cargo metadata --no-deps --format-version 1 --offline | jq -r '.packages[] | select(.name == "auto-oss") | .version')"
          test "${GITHUB_REF_NAME}" = "v${crate_version}"
          grep -Fq "## [${crate_version}] - " CHANGELOG.md
      - run: cargo test
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
