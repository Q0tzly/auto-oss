version: 0

accepts:
  scopes: [bug-fix, docs, typo, feature, refactor]
  max_diff_lines: 300

gates:
  build: "cargo build"
  test: "cargo test"
  lint: "cargo clippy --all-targets -- -D warnings"

require:
  human_review: true
  reproduction: true

fallback: issue

metadata:
  label: "auto-oss"
  language: "en"
